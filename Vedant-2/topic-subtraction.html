<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Subtraction — Math Magic</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --yellow:#FFD93D;--orange:#FF6B35;--pink:#F15BB5;
  --purple:#9B5DE5;--blue:#00BBF9;--green:#00F5D4;--bg:#FFF9F0;
  --red:#FF4757;--teal:#1e90ff;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}

/* NAV */
.topnav{
  background:linear-gradient(135deg,#00BBF9,#9B5DE5);
  padding:14px 20px;display:flex;align-items:center;gap:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.12);position:sticky;top:0;z-index:100;
}
.back-btn{background:rgba(255,255,255,.3);border:none;border-radius:50%;width:40px;height:40px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.back-btn:hover{transform:scale(1.15);}
.topnav h1{color:#fff;font-size:1.4rem;font-weight:900;text-shadow:1px 2px 0 rgba(0,0,0,.15);flex:1;}
.stars-pill{background:rgba(255,255,255,.3);color:#fff;font-weight:900;padding:5px 14px;border-radius:20px;font-size:1rem;}

/* TABS */
.tabs{display:flex;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.07);position:sticky;top:68px;z-index:99;}
.tab{flex:1;padding:14px;text-align:center;font-weight:900;font-size:.95rem;color:#aaa;cursor:pointer;border-bottom:3px solid transparent;transition:color .2s,border-color .2s;}
.tab.active{color:var(--blue);border-color:var(--blue);}

/* SCREENS */
.screen{display:none;padding:24px 20px;max-width:700px;margin:0 auto;}
.screen.active{display:block;}
.scard{background:#fff;border-radius:24px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.07);margin-bottom:20px;}
.scard-title{font-size:1.1rem;font-weight:900;color:var(--blue);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* ══ COLUMN SUBTRACTION ══ */
.num-inputs{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.num-input{width:120px;padding:10px 8px;text-align:center;font-size:1.5rem;font-weight:900;font-family:'Nunito',sans-serif;border:3px solid #ddd;border-radius:14px;background:#fff;outline:none;transition:border-color .2s;}
.num-input:focus{border-color:var(--blue);}

/* Dynamic column layout */
.col-add{
  display:flex;flex-direction:column;align-items:center;
  max-width:600px;margin:0 auto;gap:0;
  overflow-x:auto;
}
.col-row{
  display:flex;flex-direction:row;
  gap:4px;justify-content:center;align-items:center;
  min-width:fit-content;
}
.col-cell{
  width:60px;height:62px;display:flex;align-items:center;justify-content:center;
  font-size:2rem;font-weight:900;border-radius:12px;
  transition:all .3s;position:relative;flex-shrink:0;
}
.col-cell.digit{background:#e8f4ff;color:#333;}
.col-cell.minus{color:var(--blue);font-size:2.2rem;}
.col-cell.blank{background:transparent;}
.col-cell.place-label{
  background:transparent;font-size:.7rem;font-weight:900;
  color:#999;height:28px;letter-spacing:.5px;
}

/* borrow: crossed out original, small new value top-right */
.col-cell.borrowed{background:#ffe8e8;color:#ccc;text-decoration:line-through;text-decoration-color:#FF4757;}
.col-cell .new-val{
  position:absolute;top:4px;right:6px;
  font-size:.85rem;font-weight:900;color:var(--red);
  background:#fff3e0;border-radius:6px;padding:0 4px;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
.col-cell.result{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border-radius:12px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
.col-cell.result.blank{background:transparent;animation:none;}

.divider{width:100%;height:4px;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;margin:6px 0;}
@keyframes popIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}

.step-explain{background:#e8f4ff;border-radius:16px;padding:14px 18px;font-size:1rem;font-weight:700;color:#444;margin-top:14px;border-left:4px solid var(--blue);min-height:52px;line-height:1.6;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.step-btns{display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.sbtn{padding:10px 22px;border:none;border-radius:50px;font-size:.95rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .15s;box-shadow:0 3px 0 rgba(0,0,0,.15);}
.sbtn:hover{transform:translateY(-2px);}
.sbtn.primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;}
.sbtn.secondary{background:#eee;color:#555;}
.sbtn.go{background:linear-gradient(135deg,var(--green),var(--blue));color:#111;}

/* ══ BORROW VISUAL ══ */
.borrow-scene{display:flex;align-items:flex-end;justify-content:center;gap:20px;flex-wrap:wrap;margin:16px 0;min-height:100px;}
.borrow-block-wrap{text-align:center;}
.borrow-block-wrap label{display:block;font-weight:900;font-size:.85rem;color:#666;margin-top:6px;}

.block-grid{display:flex;flex-wrap:wrap;gap:3px;width:fit-content;max-width:130px;justify-content:center;}
.sq{width:22px;height:22px;border-radius:5px;transition:all .4s;}
.sq.active{background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:1px 2px 0 rgba(0,0,0,.15);}
.sq.removed{background:#eee;border:2px dashed #ccc;}
.sq.borrowed-in{background:linear-gradient(135deg,var(--orange),var(--yellow));animation:popIn .3s ease;}

.arrow-label{font-size:2rem;font-weight:900;color:var(--red);align-self:center;}

/* ══ WORD PROBLEMS ══ */
.wp-card{background:linear-gradient(135deg,#e8f4ff,#f0e8ff);border-radius:20px;padding:20px;margin-bottom:14px;border:2px solid #c0d8ff;}
.wp-emoji{font-size:3rem;display:block;text-align:center;margin-bottom:8px;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.wp-text{font-size:1rem;font-weight:700;color:#444;line-height:1.7;text-align:center;}
.wp-answer{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:14px;}
.wp-input{width:110px;padding:10px;text-align:center;font-size:1.5rem;font-weight:900;border:3px solid #ddd;border-radius:14px;font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s;}
.wp-input:focus{border-color:var(--blue);}
.wp-check{padding:10px 20px;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;border-radius:50px;color:#fff;font-size:1rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;}
.wp-fb{font-size:1rem;font-weight:900;margin-top:10px;text-align:center;min-height:28px;}

/* ══ QUIZ ══ */
.quiz-score{font-size:1rem;font-weight:900;color:#aaa;margin-bottom:20px;text-align:center;}
.qcard{background:#fff;border-radius:24px;padding:28px 22px;box-shadow:0 6px 20px rgba(0,0,0,.09);margin-bottom:20px;text-align:center;}
.qcard .qnum{font-size:2.4rem;font-weight:900;color:#333;margin-bottom:6px;letter-spacing:2px;}
.qcard .qask{font-size:1rem;color:#888;font-weight:700;margin-bottom:20px;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.opt{padding:14px;border:3px solid #eee;border-radius:16px;font-size:1.1rem;font-weight:900;cursor:pointer;background:#fff;transition:all .2s;font-family:'Nunito',sans-serif;}
.opt:hover{border-color:var(--blue);transform:scale(1.03);}
.opt.correct{background:var(--green);border-color:var(--green);color:#111;animation:bop .4s;}
.opt.wrong{background:#FFE0E0;border-color:#FF8A8A;color:#c00;}
@keyframes bop{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.feedback{margin-top:14px;font-size:1.1rem;font-weight:900;min-height:32px;}
.feedback.ok{color:#00b894;} .feedback.no{color:#e17055;}
.next-btn{margin-top:16px;padding:13px 34px;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;border-radius:50px;font-size:1rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.15);transition:transform .15s;display:none;}
.next-btn:hover{transform:translateY(-3px);}
.finish-card{background:linear-gradient(135deg,#00BBF9,#9B5DE5);border-radius:24px;padding:36px 24px;text-align:center;color:#fff;}
.finish-card .big{font-size:5rem;}
.finish-card h2{font-size:2rem;font-weight:900;margin:10px 0 6px;}
.finish-card p{font-size:1rem;opacity:.9;margin-bottom:16px;}
.score-big{font-size:3rem;font-weight:900;background:rgba(255,255,255,.25);border-radius:16px;padding:10px 24px;display:inline-block;margin-bottom:16px;}
.retry-btn{padding:12px 28px;background:#fff;color:var(--blue);border:none;border-radius:50px;font-size:1rem;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;}

/* confetti */
.confetti-piece{position:fixed;width:10px;height:14px;border-radius:2px;animation:fall 1.2s ease-in forwards;z-index:999;pointer-events:none;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div class="topnav">
  <button class="back-btn" onclick="history.back()">←</button>
  <h1>➖ Subtraction</h1>
  <div class="stars-pill">⭐ 12</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('learn',this)">📖 Learn</div>
  <div class="tab" onclick="switchTab('word',this)">📝 Word Problems</div>
  <div class="tab" onclick="switchTab('play',this)">🎮 Play</div>
</div>

<!-- ════════════════════════ LEARN ════════════════════════ -->
<div id="learn" class="screen active">

  <!-- Column subtraction stepper -->
  <div class="scard">
    <div class="scard-title">📐 Column Subtraction — Step by Step</div>
    <p style="color:#aaa;font-size:.9rem;font-weight:700;margin-bottom:14px;">Enter two numbers (up to 6 digits) and see the borrowing method!</p>

    <div class="num-inputs">
      <input class="num-input" id="numA" type="number" min="10" max="999999" value="700"/>
      <span style="font-size:2rem;font-weight:900;color:var(--blue);line-height:58px;">−</span>
      <input class="num-input" id="numB" type="number" min="1"  max="999998" value="245"/>
    </div>
    <div style="text-align:center;margin-bottom:14px;">
      <button class="sbtn go" onclick="startSub()">▶ Start</button>
    </div>

    <!-- dynamically built column layout -->
    <div class="col-add" id="colSub" style="display:none;"></div>

    <div class="step-explain" id="stepExp" style="display:none;"></div>
    <div class="step-btns" id="stepBtns" style="display:none;">
      <button class="sbtn secondary" onclick="prevStep()">← Back</button>
      <button class="sbtn primary"   onclick="nextStep()">Next Step →</button>
    </div>
  </div>

  <!-- Borrow visual -->
  <div class="scard">
    <div class="scard-title">🔄 What is Borrowing? — See it!</div>
    <p style="color:#aaa;font-size:.9rem;font-weight:700;margin-bottom:6px;">When a digit is too small to subtract, we <strong style="color:var(--red);">borrow</strong> from the next column!</p>

    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0;">
      <button class="sbtn primary" onclick="showBorrow()">👀 Show Borrowing</button>
      <button class="sbtn secondary" onclick="resetBorrow()">🔄 Reset</button>
    </div>

    <!-- Visual: 32 - 8 -->
    <div style="text-align:center;font-size:1.3rem;font-weight:900;color:#333;margin-bottom:10px;" id="borrowTitle">32 − 8 = ?</div>
    <div class="borrow-scene" id="borrowScene">
      <!-- rendered by JS -->
    </div>
    <div style="text-align:center;font-size:1rem;font-weight:700;color:#666;margin-top:8px;" id="borrowDesc"></div>
  </div>

</div><!-- /learn -->


<!-- ════════════════════════ WORD PROBLEMS ════════════════════════ -->
<div id="word" class="screen">
  <div id="wpCards"></div>
  <div style="text-align:center;margin-top:4px;">
    <button class="sbtn primary" onclick="newWordProblems()">🔀 New Problems</button>
  </div>
</div>


<!-- ════════════════════════ PLAY ════════════════════════ -->
<div id="play" class="screen">
  <div class="quiz-score" id="quizScore">Question 1 of 8</div>
  <div id="quizArea"></div>
</div>


<script>
// ── tab switch ──
function switchTab(id,el){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
  if(id==='play') initQuiz();
  if(id==='word') newWordProblems();
  if(id==='learn') resetBorrow();
}

// ══════════════════════════════════════════════════════════════
//  DYNAMIC COLUMN SUBTRACTION STEPPER
// ══════════════════════════════════════════════════════════════
const PLACE_NAMES  = ['Ones','Tens','Hundreds','Thousands','Ten-Thousands','Hundred-Thousands'];
const PLACE_ABBREV = ['O',   'T',   'H',       'TH',       'TTH',          'HTH'];

let steps=[], stepIdx=0;
// references to DOM cell elements (index 0 = ones)
let aEls=[], bEls=[], resultEls=[];

function startSub(){
  let A = Math.min(999999, Math.max(10, +document.getElementById('numA').value || 700));
  let B = Math.min(A-1,    Math.max(1,  +document.getElementById('numB').value || 245));
  document.getElementById('numA').value = A;
  document.getElementById('numB').value = B;

  // ── extract digits (index 0 = ones place) ──
  const numCols = Math.max(A.toString().length, (A-B).toString().length);
  const aDigits = [], bDigits = [];
  let tmp = A, tmp2 = B;
  for(let i=0; i<numCols; i++){
    aDigits.push(tmp % 10); tmp = Math.floor(tmp / 10);
    bDigits.push(tmp2 % 10); tmp2 = Math.floor(tmp2 / 10);
  }

  // ── simulate cascading borrows ──
  // eff[i] = effective digit of A in column i after all borrows resolved
  const eff = [...aDigits];
  // borrowedFrom[i] = true if column i was borrowed FROM (gave 1 to column i-1)
  const borrowedFrom = new Array(numCols).fill(false);
  // borrowedInto[i] = true if column i received +10 from borrowing
  const borrowedInto = new Array(numCols).fill(false);

  for(let i=0; i<numCols; i++){
    if(eff[i] < bDigits[i]){
      // need to borrow: find nearest non-zero column to the left
      let j = i + 1;
      while(j < numCols && eff[j] === 0) j++;
      if(j < numCols){
        // cascade: columns i+1 … j-1 were zero, they each get 9 after cascading
        eff[j]--;
        borrowedFrom[j] = true;
        for(let k = j-1; k > i; k--){
          eff[k] = 9;
          borrowedFrom[k] = true;
          borrowedInto[k] = true;
        }
        eff[i] += 10;
        borrowedInto[i] = true;
      }
    }
  }

  // result digits
  const rDigits = aDigits.map((d,i) => eff[i] - bDigits[i]);

  // ── build DOM ──
  const container = document.getElementById('colSub');
  container.innerHTML = '';
  container.style.display = 'flex';
  aEls = []; bEls = []; resultEls = [];

  // helper: make a cell
  function makeCell(cls, text=''){
    const d = document.createElement('div');
    d.className = 'col-cell ' + cls;
    d.textContent = text;
    return d;
  }

  // ROW A (top number, with borrow annotation slots)
  const rowA = document.createElement('div'); rowA.className='col-row';
  // sign placeholder (blank)
  rowA.appendChild(makeCell('blank'));
  // digits right-to-left in display = highest index first
  for(let i=numCols-1; i>=0; i--){
    const cell = makeCell('digit', aDigits[i]);
    aEls[i] = cell;
    rowA.appendChild(cell);
  }
  container.appendChild(rowA);

  // ROW B (bottom number with − sign)
  const rowB = document.createElement('div'); rowB.className='col-row';
  rowB.appendChild(makeCell('minus', '−'));
  for(let i=numCols-1; i>=0; i--){
    const cell = makeCell('digit', bDigits[i] === 0 ? '0' : bDigits[i]);
    bEls[i] = cell;
    rowB.appendChild(cell);
  }
  container.appendChild(rowB);

  // DIVIDER
  const div = document.createElement('div'); div.className='divider';
  container.appendChild(div);

  // RESULT ROW
  const rowR = document.createElement('div'); rowR.className='col-row';
  rowR.appendChild(makeCell('blank'));
  for(let i=numCols-1; i>=0; i--){
    const cell = makeCell('col-cell result blank');
    // fix: use plain div, not "col-cell col-cell result blank"
    cell.className = 'col-cell result blank';
    resultEls[i] = cell;
    rowR.appendChild(cell);
  }
  container.appendChild(rowR);

  // PLACE-VALUE LABEL ROW
  const rowL = document.createElement('div'); rowL.className='col-row';
  rowL.appendChild(makeCell('place-label blank'));
  for(let i=numCols-1; i>=0; i--){
    rowL.appendChild(makeCell('place-label', PLACE_ABBREV[i]||''));
  }
  container.appendChild(rowL);

  // ── build steps ──
  steps = [];

  // Step 0: intro
  steps.push({
    explain: `👉 We are solving <strong>${A} − ${B}</strong>.<br>Start from the <strong>Ones</strong> column on the right. Work column by column leftwards.`,
    action: () => {}
  });

  // One or two steps per column
  for(let i=0; i<numCols; i++){
    const placeName = PLACE_NAMES[i] || `Column ${i+1}`;
    const orig = aDigits[i];
    const effVal = eff[i];
    const sub = bDigits[i];
    const res = rDigits[i];

    if(borrowedInto[i]){
      // borrow step first
      steps.push({
        explain: `😮 <strong>${placeName}:</strong> ${orig} < ${sub} — can't subtract!<br>
                  We <strong style="color:var(--red);">borrow</strong> from the ${PLACE_NAMES[i+1]||'next'} column.<br>
                  ${placeName} digit becomes <strong>${effVal}</strong> (${orig} + 10).`,
        action: () => {
          markBorrowed(i, orig, effVal);
          // also show the column we borrowed from decreasing
          // find which column was the borrow source
          let src = i+1;
          while(src < numCols && borrowedFrom[src] && borrowedInto[src]) src++;
          if(src < numCols && borrowedFrom[src]){
            markBorrowed(src, aDigits[src], eff[src]);
          }
          // cascade intermediates
          for(let k=i+1; k<src; k++){
            if(borrowedFrom[k] && borrowedInto[k]) markBorrowed(k, 0, 9);
          }
        }
      });
    }

    steps.push({
      explain: `✅ <strong>${placeName}:</strong> ${effVal} − ${sub} = <strong>${res}</strong>`,
      action: () => { revealResult(i, res); }
    });
  }

  // Final step: done
  steps.push({
    explain: `🎉 <strong>${A} − ${B} = ${A-B}</strong> — Amazing! You used column subtraction like a pro! 🦸`,
    action: () => { confettiBurst(30); }
  });

  document.getElementById('stepExp').style.display = 'block';
  document.getElementById('stepBtns').style.display = 'flex';

  stepIdx = 0;
  applyStep(0);
}

function markBorrowed(colIdx, orig, newV){
  const el = aEls[colIdx];
  if(!el) return;
  el.className = 'col-cell digit borrowed';
  el.textContent = orig;
  el.querySelectorAll('.new-val').forEach(n=>n.remove());
  const nv = document.createElement('span');
  nv.className = 'new-val';
  nv.textContent = newV;
  el.appendChild(nv);
}

function revealResult(colIdx, val){
  const el = resultEls[colIdx];
  if(!el) return;
  el.textContent = val;
  el.className = 'col-cell result';
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'popIn .5s cubic-bezier(.34,1.56,.64,1)';
}

function applyStep(idx){
  const exp = document.getElementById('stepExp');
  exp.innerHTML = steps[idx].explain;
  exp.style.animation = 'none';
  void exp.offsetWidth;
  exp.style.animation = 'fadeIn .3s ease';
  steps[idx].action();
}
function nextStep(){ if(stepIdx < steps.length-1){ stepIdx++; applyStep(stepIdx); }}
function prevStep(){ if(stepIdx > 0){ stepIdx--; } }

// ══════════════════════════════
//  BORROW VISUAL (32 - 8)
// ══════════════════════════════
let borrowPhase=0;
function resetBorrow(){
  borrowPhase=0;
  document.getElementById('borrowTitle').textContent='32 − 8 = ?';
  document.getElementById('borrowDesc').textContent='We have 32 blocks. We need to take away 8.';
  renderBorrow(0);
}
function showBorrow(){
  borrowPhase=(borrowPhase+1)%4;
  renderBorrow(borrowPhase);
}
function renderBorrow(phase){
  const scene=document.getElementById('borrowScene');
  scene.innerHTML='';
  const desc=document.getElementById('borrowDesc');
  const title=document.getElementById('borrowTitle');

  if(phase===0){
    title.textContent='32 − 8 = ?';
    desc.textContent='We have 3 tens and 2 ones = 32 blocks total.';
    appendGroup(scene,'Tens (3)',3,'ten',false,false);
    appendGroup(scene,'Ones (2)',2,'one',false,false);
  } else if(phase===1){
    title.textContent='Oops! 2 < 8 😮';
    desc.innerHTML='We only have <strong>2 ones</strong> but need to take <strong>8</strong>. We need to <strong style="color:var(--red);">borrow!</strong>';
    appendGroup(scene,'Tens (3)',3,'ten',false,false);
    appendGroup(scene,'Ones (2)',2,'one',true,false);
  } else if(phase===2){
    title.textContent='Borrow 1 ten → 10 ones! 🔄';
    desc.innerHTML='Break 1 ten into <strong>10 ones</strong>. Now we have <strong>2 tens + 12 ones</strong>.';
    appendGroup(scene,'Tens (2)',2,'ten',false,false);
    appendGroup(scene,'Ones (12)',12,'one',false,true);
  } else {
    title.textContent='32 − 8 = 24 ✅';
    desc.innerHTML='Take away 8 ones. Left with <strong>2 tens + 4 ones = 24</strong> 🎉';
    appendGroup(scene,'Tens (2)',2,'ten',false,false);
    appendGroup(scene,'Kept (4)',4,'one',false,false);
    appendGroup(scene,'Taken (8)',8,'one-taken',false,false);
    confettiBurst(15);
  }
}
function appendGroup(scene,label,count,type,warn,highlight){
  const wrap=document.createElement('div'); wrap.className='borrow-block-wrap';
  const grid=document.createElement('div'); grid.className='block-grid';
  for(let i=0;i<count;i++){
    const sq=document.createElement('div');
    if(type==='ten'){
      sq.style.cssText=`width:18px;height:52px;border-radius:6px;background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:1px 2px 0 rgba(0,0,0,.15);animation:popIn .3s ease;animation-delay:${i*.06}s;opacity:0;animation-fill-mode:forwards;`;
    } else if(type==='one'){
      sq.className='sq active';
      if(warn) sq.style.cssText='width:22px;height:22px;border-radius:5px;background:var(--red);animation:popIn .3s ease;';
      if(highlight) sq.style.cssText+=`animation-delay:${i*.04}s;background:linear-gradient(135deg,var(--orange),var(--yellow));`;
    } else {
      sq.className='sq removed';
    }
    grid.appendChild(sq);
  }
  const lbl=document.createElement('label'); lbl.textContent=label;
  wrap.appendChild(grid); wrap.appendChild(lbl);
  scene.appendChild(wrap);
}
resetBorrow();

// ══════════════════════════════
//  WORD PROBLEMS
// ══════════════════════════════
const WP_POOL=[
  (a,b)=>({emoji:'🍬',text:`Anika had <strong>${a}</strong> sweets. She ate <strong>${b}</strong> sweets. How many sweets are left?`,ans:a-b}),
  (a,b)=>({emoji:'🚂',text:`A train has <strong>${a}</strong> passengers. <strong>${b}</strong> passengers get off at the station. How many are still on the train?`,ans:a-b}),
  (a,b)=>({emoji:'🎈',text:`There were <strong>${a}</strong> balloons at the party. <strong>${b}</strong> balloons burst. How many balloons are left?`,ans:a-b}),
  (a,b)=>({emoji:'📦',text:`A shop had <strong>${a}</strong> boxes. The shopkeeper sold <strong>${b}</strong> boxes. How many boxes remain?`,ans:a-b}),
  (a,b)=>({emoji:'🐦',text:`There were <strong>${a}</strong> birds on a tree. <strong>${b}</strong> birds flew away. How many birds are still on the tree?`,ans:a-b}),
  (a,b)=>({emoji:'💧',text:`A water tank has <strong>${a}</strong> litres of water. <strong>${b}</strong> litres are used. How many litres are left?`,ans:a-b}),
];

function wpRandPair(){
  // mix of 2-digit, 3-digit, and 4-digit problems
  const pick = rnd(3);
  if(pick === 0){
    const b = rnd(40)+10;
    const a = b + rnd(50)+10;
    return [a,b];
  } else if(pick === 1){
    const b = rnd(400)+50;
    const a = b + rnd(300)+100;
    return [a,b];
  } else {
    const b = rnd(3000)+500;
    const a = b + rnd(2000)+500;
    return [a,b];
  }
}

function newWordProblems(){
  const container=document.getElementById('wpCards'); container.innerHTML='';
  shuffle([...WP_POOL]).slice(0,3).forEach((fn,i)=>{
    const [a,b] = wpRandPair();
    const {emoji,text,ans}=fn(a,b);
    container.innerHTML+=`
    <div class="wp-card">
      <span class="wp-emoji">${emoji}</span>
      <div class="wp-text">${text}</div>
      <div class="wp-answer">
        <input class="wp-input" id="wpi${i}" type="number" placeholder="?"/>
        <button class="wp-check" onclick="checkWP(${i},${ans})">Check ✅</button>
      </div>
      <div class="wp-fb" id="wpfb${i}"></div>
    </div>`;
  });
}
function checkWP(i,ans){
  const val=+document.getElementById('wpi'+i).value;
  const fb=document.getElementById('wpfb'+i);
  if(!val&&val!==0){fb.textContent='Type your answer first!';fb.style.color='#aaa';return;}
  if(val===ans){fb.innerHTML='🎉 Correct! <strong>'+ans+'</strong> is right!';fb.style.color='#00b894';confettiBurst(20);}
  else{fb.innerHTML='😅 Not quite. The answer is <strong>'+ans+'</strong>';fb.style.color='#e17055';}
}

// ══════════════════════════════
//  QUIZ
// ══════════════════════════════
function genQ(){
  const type = rnd(6);
  if(type === 0){
    // 2-digit
    const a=rnd(80)+20, b=rnd(a-1)+1;
    return {q:`${a} − ${b}`, ans:a-b, wrongs:[a-b+10,a-b-5,a-b+1,a+b]};
  } else if(type === 1){
    // 3-digit
    const a=rnd(700)+200, b=rnd(150)+10;
    return {q:`${a} − ${b}`, ans:a-b, wrongs:[a-b+10,a-b-10,a-b+100,a-b-1]};
  } else if(type === 2){
    // fill blank: a − ___ = c
    const c=rnd(80)+10, b=rnd(60)+5;
    const a=c+b;
    return {q:`${a} − ___ = ${c}`, ans:b, wrongs:[b+10,b-5,c,a]};
  } else if(type === 3){
    // 4-digit
    const a=rnd(5000)+3000, b=rnd(1500)+200;
    return {q:`${a} − ${b}`, ans:a-b, wrongs:[a-b+100,a-b-100,a-b+1000,a-b+50]};
  } else if(type === 4){
    // 5-digit
    const a=rnd(50000)+30000, b=rnd(9000)+1000;
    return {q:`${a} − ${b}`, ans:a-b, wrongs:[a-b+1000,a-b-1000,a-b+500,a-b+200]};
  } else {
    // 3-digit with borrow across zeros
    const a=rnd(400)+300, b=rnd(200)+50;
    return {q:`${a} − ${b}`, ans:a-b, wrongs:[a-b+100,a-b-100,b-a<0?b:a-b+50,a+b]};
  }
}

let qs=[],qi=0,score=0,qAnswered=false;
function initQuiz(){qs=Array.from({length:8},genQ);qi=0;score=0;qAnswered=false;renderQ();}
function renderQ(){
  if(qi>=qs.length){showFinish();return;}
  document.getElementById('quizScore').textContent=`Question ${qi+1} of ${qs.length}  |  ⭐ ${score}`;
  const q=qs[qi]; qAnswered=false;
  const opts=shuffle([q.ans,...q.wrongs.filter(w=>w>=0&&w!==q.ans).slice(0,3)]);
  document.getElementById('quizArea').innerHTML=`
    <div class="qcard">
      <div class="qnum">${q.q}</div>
      <div class="qask">What is the answer?</div>
      <div class="options">${opts.map(o=>`<button class="opt" onclick="checkAns(this,${o},${q.ans})">${o}</button>`).join('')}</div>
      <div class="feedback" id="fb"></div>
    </div>
    <button class="next-btn" id="nxt" onclick="nextQ()">Next ➡</button>`;
}
function checkAns(btn,chosen,correct){
  if(qAnswered)return; qAnswered=true;
  const fb=document.getElementById('fb');
  document.getElementById('nxt').style.display='inline-block';
  if(chosen===correct){
    btn.classList.add('correct');fb.textContent='🎉 Correct!';fb.className='feedback ok';
    score++;confettiBurst(25);
  } else {
    btn.classList.add('wrong');
    fb.innerHTML=`😅 The answer is <strong>${correct}</strong>`;fb.className='feedback no';
    document.querySelectorAll('.opt').forEach(o=>{if(+o.textContent===correct)o.classList.add('correct');});
  }
  document.getElementById('quizScore').textContent=`Question ${qi+1} of ${qs.length}  |  ⭐ ${score}`;
}
function nextQ(){qi++;renderQ();}
function showFinish(){
  const pct=Math.round(score/qs.length*100);
  const msg=pct===100?'🌟 Perfect! You\'re a Subtraction Star!':pct>=75?'🎊 Awesome!':pct>=50?'👍 Good effort!':'💪 Keep practising!';
  document.getElementById('quizArea').innerHTML=`<div class="finish-card"><div class="big">${pct===100?'🏆':'🎯'}</div><h2>Quiz Done!</h2><p>${msg}</p><div class="score-big">${score} / ${qs.length} ⭐</div><br><button class="retry-btn" onclick="initQuiz()">🔄 Try Again</button></div>`;
  if(pct===100)confettiBurst(80);
  document.getElementById('quizScore').textContent=`Final: ${score} / ${qs.length}`;
}

function rnd(n){return Math.floor(Math.random()*n);}
function shuffle(a){return a.sort(()=>Math.random()-.5);}
function confettiBurst(count=30){
  const cols=['#FFD93D','#FF6B35','#9B5DE5','#00BBF9','#F15BB5','#00F5D4'];
  for(let i=0;i<count;i++){
    const c=document.createElement('div');c.className='confetti-piece';
    c.style.cssText=`left:${20+Math.random()*60}vw;top:30vh;background:${cols[i%cols.length]};animation-delay:${Math.random()*.4}s;animation-duration:${.9+Math.random()*.5}s;`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),1600);
  }
}
